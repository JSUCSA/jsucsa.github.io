# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: JSCSA
subtitle: '江苏大学计算机科技协会'
description: '江苏大学计算机科技协会 — 技术分享 · 社区交流 · 共同成长'
keywords:
  - JSCSA
  - 江苏大学
  - 计算机科技协会
  - 技术社区
author: JSCSA
language: zh-CN
timezone: ''

# URL
url: https://jsucsa.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - '*.html'

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: jsucsa-theme

# Deployment
deploy:
  type: git
  repo: https://github.com/JSUCSA/jsucsa.github.io.git
  branch: main
