# Hexo Configuration
title: JSUCSA
subtitle: '江苏大学计算机协会'
description: '江苏大学计算机协会 — SRE · Agent 开发 · 网络安全 · AI'
keywords:
  - JSUCSA
  - 江苏大学
  - 计算机协会
  - SRE
  - Agent
  - 网络安全
  - AI
author: JSUCSA
language: zh-CN
timezone: ''

# URL
url: https://jsucsa.github.io
root: /
permalink: blog/:year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: blog/tags
archive_dir: blog/archives
category_dir: blog/categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - '*.html'
  - 'admin/**'

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting - blog at /blog/
index_generator:
  path: blog
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'
per_page: 10
pagination_dir: page

include:
exclude:
ignore:

# Theme
theme: icarus

# Deployment
deploy:
  type: git
  repo: https://github.com/JSUCSA/jsucsa.github.io.git
  branch: main
