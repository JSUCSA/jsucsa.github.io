<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSUCSA 博客管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e1a; color: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .box {
      background: #1a1f35; border: 1px solid rgba(148,163,184,0.1);
      border-radius: 20px; padding: 48px; text-align: center;
      max-width: 420px; width: 90%;
    }
    .box .logo { font-size: 2.5rem; margin-bottom: 16px; }
    .box h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .box p { color: #94a3b8; margin-bottom: 32px; font-size: 0.95rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px; border-radius: 28px; font-size: 1rem;
      font-weight: 600; cursor: pointer; border: none;
      background: linear-gradient(135deg, #f03e2f, #f44);
      color: white; transition: all 0.3s; text-decoration: none;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(240,62,47,0.4); }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">📝</div>
    <h1>JSUCSA 博客管理</h1>
    <p>点击进入 Sanity Studio 编辑器</p>
    <!-- 替换 YOUR_PROJECT_ID 为你的 Sanity 项目 ID -->
    <a class="btn" href="https://jsucsa-blog.sanity.studio" target="_blank">
      打开编辑器 →
    </a>
    <p style="margin-top:24px;font-size:0.8rem;color:#64748b;">
      使用 Sanity 账号登录，仅限授权用户
    </p>
  </div>
</body>
</html>
