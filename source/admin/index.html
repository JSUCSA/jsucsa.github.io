<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSUCSA 博客编辑器</title>
  <style>
    :root {
      --bg: #0a0e1a; --bg2: #111827; --card: #1a1f35;
      --text: #f1f5f9; --text2: #94a3b8; --muted: #64748b;
      --blue: #3b82f6; --cyan: #06b6d4; --purple: #8b5cf6;
      --green: #10b981; --red: #ef4444; --orange: #f59e0b;
      --border: rgba(148,163,184,0.1); --grad: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --font: 'Noto Sans SC', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--font); background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }

    /* Top bar */
    .topbar {
      display:flex; align-items:center; gap:12px; padding:10px 20px;
      background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .topbar .logo { font-weight:700; font-size:1rem; display:flex; align-items:center; gap:8px; }
    .topbar .logo .icon { font-family:var(--mono); color:var(--cyan); background:rgba(6,182,212,0.1); padding:3px 8px; border-radius:6px; border:1px solid rgba(6,182,212,0.2); font-size:0.85rem; }
    .topbar .sep { width:1px; height:24px; background:var(--border); }
    .topbar .file-path { font-family:var(--mono); font-size:0.8rem; color:var(--muted); }

    /* Actions */
    .topbar .actions { margin-left:auto; display:flex; gap:8px; }
    .btn {
      padding:7px 16px; border-radius:8px; font-size:0.82rem; font-weight:600;
      cursor:pointer; border:none; transition:0.2s; font-family:var(--font);
      display:inline-flex; align-items:center; gap:6px;
    }
    .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
    .btn-ghost:hover { border-color:var(--blue); color:var(--text); }
    .btn-primary { background:var(--grad); color:#fff; }
    .btn-primary:hover { box-shadow:0 4px 15px rgba(59,130,246,0.4); transform:translateY(-1px); }
    .btn-green { background:var(--green); color:#fff; }
    .btn-green:hover { box-shadow:0 4px 15px rgba(16,185,129,0.4); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; box-shadow:none !important; }

    /* Editor area */
    .editor-wrap { display:flex; flex:1; overflow:hidden; }

    /* Sidebar */
    .sidebar {
      width:240px; background:var(--bg2); border-right:1px solid var(--border);
      display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
    }
    .sidebar-header { padding:14px 16px; font-size:0.85rem; font-weight:600; color:var(--text2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .sidebar-header button { background:none; border:none; color:var(--cyan); cursor:pointer; font-size:1.1rem; padding:2px 6px; border-radius:4px; }
    .sidebar-header button:hover { background:rgba(6,182,212,0.1); }
    .post-list { flex:1; overflow-y:auto; padding:8px; }
    .post-item {
      padding:10px 12px; border-radius:8px; cursor:pointer; margin-bottom:4px;
      transition:0.2s; border:1px solid transparent;
    }
    .post-item:hover { background:rgba(255,255,255,0.03); border-color:var(--border); }
    .post-item.active { background:rgba(59,130,246,0.1); border-color:rgba(59,130,246,0.3); }
    .post-item .p-title { font-size:0.85rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .post-item .p-date { font-size:0.72rem; color:var(--muted); margin-top:3px; }

    /* Meta panel */
    .meta-panel {
      padding:16px; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .meta-row { display:flex; gap:8px; margin-bottom:10px; }
    .meta-row:last-child { margin-bottom:0; }
    .meta-row label { font-size:0.78rem; color:var(--muted); min-width:40px; padding-top:8px; }
    .meta-row input, .meta-row select {
      flex:1; padding:7px 10px; background:var(--card); border:1px solid var(--border);
      border-radius:6px; color:var(--text); font-size:0.82rem; font-family:var(--font);
    }
    .meta-row input:focus, .meta-row select:focus { outline:none; border-color:var(--blue); }
    .meta-row select { cursor:pointer; }
    .meta-row select option { background:var(--card); }

    /* Editor panes */
    .pane { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .pane-header {
      padding:8px 16px; font-size:0.75rem; font-weight:600; color:var(--muted);
      text-transform:uppercase; letter-spacing:1px;
      background:rgba(0,0,0,0.2); border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .editor-pane { border-right:1px solid var(--border); }
    textarea {
      flex:1; width:100%; padding:20px; background:transparent; border:none;
      color:var(--text); font-family:var(--mono); font-size:0.88rem; line-height:1.8;
      resize:none; outline:none; tab-size:2;
    }
    textarea::placeholder { color:var(--muted); }
    .preview-pane .content {
      flex:1; padding:20px; overflow-y:auto; font-size:0.92rem; line-height:1.9;
    }
    .content h1 { font-size:1.6rem; font-weight:800; margin:24px 0 12px; }
    .content h2 { font-size:1.35rem; font-weight:700; margin:20px 0 10px; }
    .content h3 { font-size:1.15rem; font-weight:600; margin:16px 0 8px; }
    .content p { margin-bottom:14px; color:var(--text2); }
    .content pre { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px; overflow-x:auto; margin:12px 0; }
    .content code { font-family:var(--mono); font-size:0.85em; }
    .content p code { background:rgba(59,130,246,0.1); padding:2px 6px; border-radius:4px; }
    .content pre code { background:none; }
    .content ul, .content ol { padding-left:22px; margin-bottom:14px; color:var(--text2); }
    .content li { margin-bottom:6px; }
    .content blockquote { border-left:3px solid var(--blue); padding:10px 18px; margin:12px 0; background:rgba(59,130,246,0.05); border-radius:0 8px 8px 0; color:var(--text2); }
    .content a { color:var(--cyan); }
    .content img { max-width:100%; border-radius:10px; margin:12px 0; }
    .content table { width:100%; border-collapse:collapse; margin:12px 0; }
    .content th, .content td { padding:8px 12px; border:1px solid var(--border); text-align:left; font-size:0.85rem; }
    .content th { background:var(--bg2); font-weight:600; }

    /* Status bar */
    .statusbar {
      display:flex; align-items:center; gap:16px; padding:6px 20px;
      background:var(--bg2); border-top:1px solid var(--border);
      font-size:0.75rem; color:var(--muted); flex-shrink:0;
    }
    .statusbar .dot { width:8px; height:8px; border-radius:50%; }
    .statusbar .dot.ok { background:var(--green); }
    .statusbar .dot.err { background:var(--red); }
    .statusbar .dot.loading { background:var(--orange); animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Token dialog */
    .dialog-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100;
      display:flex; align-items:center; justify-content:center;
    }
    .dialog-overlay.hidden { display:none; }
    .dialog {
      background:var(--card); border:1px solid var(--border); border-radius:16px;
      padding:32px; max-width:480px; width:90%;
    }
    .dialog h2 { font-size:1.3rem; margin-bottom:8px; }
    .dialog p { color:var(--text2); font-size:0.9rem; margin-bottom:20px; line-height:1.6; }
    .dialog input {
      width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-family:var(--mono); font-size:0.85rem;
      margin-bottom:16px;
    }
    .dialog input:focus { outline:none; border-color:var(--blue); }
    .dialog .dialog-actions { display:flex; gap:8px; justify-content:flex-end; }
    .dialog .hint { font-size:0.78rem; color:var(--muted); margin-bottom:16px; }
    .dialog .hint a { color:var(--cyan); }

    /* Toast */
    .toast {
      position:fixed; bottom:20px; right:20px; padding:12px 20px;
      border-radius:10px; font-size:0.85rem; font-weight:500;
      z-index:200; transform:translateY(100px); opacity:0; transition:0.3s;
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { background:var(--green); color:#fff; }
    .toast.error { background:var(--red); color:#fff; }

    /* Responsive */
    @media (max-width:768px) {
      .sidebar { display:none; }
      .editor-wrap { flex-direction:column; }
      .editor-pane { border-right:none; border-bottom:1px solid var(--border); }
      .pane { min-height:40vh; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Token Dialog -->
  <div class="dialog-overlay" id="tokenDialog">
    <div class="dialog">
      <h2>🔑 连接 GitHub</h2>
      <p>输入你的 GitHub Personal Access Token 来保存文章。</p>
      <div class="hint">
        生成方式：<a href="https://github.com/settings/tokens/new?scopes=repo&description=JSUCSA+Blog+Editor" target="_blank">
          GitHub → Settings → Tokens → Generate new token
        <br>勾选 <strong>repo</strong> 权限即可。</a>
      </div>
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
      <div class="dialog-actions">
        <button class="btn btn-ghost" onclick="skipToken()">稍后设置</button>
        <button class="btn btn-primary" onclick="saveToken()">连接</button>
      </div>
    </div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo"><span class="icon">&lt;/&gt;</span> JSUCSA</div>
    <div class="sep"></div>
    <div class="file-path" id="filePath">source/_posts/新文章.md</div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="newPost()" title="新建文章">✏️ 新建</button>
      <button class="btn btn-ghost" onclick="location.href='/blog/'" title="查看博客">👀 预览</button>
      <button class="btn btn-green" id="saveBtn" onclick="savePost()" disabled>💾 保存</button>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-wrap">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        📄 文章列表
        <button onclick="loadPosts()" title="刷新">↻</button>
      </div>
      <div class="post-list" id="postList">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:0.8rem;">加载中...</div>
      </div>
    </div>

    <!-- Left: meta + editor -->
    <div class="pane editor-pane">
      <div class="meta-panel">
        <div class="meta-row">
          <label>标题</label>
          <input type="text" id="metaTitle" placeholder="文章标题" oninput="updatePreview()">
        </div>
        <div class="meta-row">
          <label>分类</label>
          <select id="metaCategory">
            <option value="SRE">SRE</option>
            <option value="Agent">Agent</option>
            <option value="网络安全">网络安全</option>
            <option value="AI">AI</option>
            <option value="公告" selected>公告</option>
          </select>
          <label>标签</label>
          <input type="text" id="metaTags" placeholder="逗号分隔，如: 运维,教程" oninput="updatePreview()">
        </div>
      </div>
      <div class="pane-header">Markdown</div>
      <textarea id="editor" placeholder="在这里写 Markdown...&#10;&#10;支持标准 Markdown 语法&#10;快捷键: Ctrl+S 保存" oninput="updatePreview()" onkeydown="handleTab(event)"></textarea>
    </div>

    <!-- Right: preview -->
    <div class="pane preview-pane">
      <div class="pane-header">预览</div>
      <div class="content" id="preview">
        <p style="color:var(--muted);">开始写作后这里会显示预览...</p>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">未连接</span>
    <span style="margin-left:auto" id="wordCount">0 字</span>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // ============================================
    // GitHub Config
    // ============================================
    const REPO = 'JSUCSA/jsucsa.github.io';
    const BRANCH = 'main';
    const POSTS_DIR = 'source/_posts';

    let token = localStorage.getItem('gh_token') || '';
    let currentFile = null; // { name, sha }
    let posts = [];

    const $ = id => document.getElementById(id);

    // ============================================
    // Token
    // ============================================
    if (token) {
      $('tokenDialog').classList.add('hidden');
      setStatus('ok', '已连接');
      $('saveBtn').disabled = false;
      loadPosts();
    }

    function saveToken() {
      const val = $('tokenInput').value.trim();
      if (!val) return;
      token = val;
      localStorage.setItem('gh_token', token);
      $('tokenDialog').classList.add('hidden');
      setStatus('loading', '验证中...');
      verifyToken();
    }

    function skipToken() {
      $('tokenDialog').classList.add('hidden');
      setStatus('err', '未连接 — 无法保存');
    }

    async function verifyToken() {
      try {
        const res = await fetch('https://api.github.com/user', {
          headers: { Authorization: `token ${token}` }
        });
        if (res.ok) {
          const user = await res.json();
          setStatus('ok', `已连接: ${user.login}`);
          $('saveBtn').disabled = false;
          loadPosts();
        } else {
          setStatus('err', 'Token 无效');
          token = '';
          localStorage.removeItem('gh_token');
        }
      } catch {
        setStatus('err', '连接失败');
      }
    }

    // ============================================
    // Posts list
    // ============================================
    async function loadPosts() {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${POSTS_DIR}?ref=${BRANCH}`, {
          headers: token ? { Authorization: `token ${token}` } : {}
        });
        if (!res.ok) throw new Error('加载失败');
        posts = (await res.json()).filter(f => f.name.endsWith('.md'));
        renderPostList();
      } catch (err) {
        $('postList').innerHTML = `<div style="padding:20px;text-align:center;color:var(--red);font-size:0.8rem;">加载失败</div>`;
      }
    }

    function renderPostList() {
      if (!posts.length) {
        $('postList').innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.8rem;">暂无文章</div>`;
        return;
      }
      $('postList').innerHTML = posts.map(p => {
        const date = p.name.match(/^(\d{4}-\d{2}-\d{2})/);
        const title = p.name.replace(/\.md$/, '').replace(/^\d{4}-\d{2}-\d{2}-/, '');
        return `<div class="post-item ${currentFile?.name === p.name ? 'active' : ''}" onclick="openPost('${p.name}')">
          <div class="p-title">${escapeHtml(title)}</div>
          <div class="p-date">${date ? date[1] : p.name}</div>
        </div>`;
      }).join('');
    }

    // ============================================
    // Open post
    // ============================================
    async function openPost(name) {
      setStatus('loading', '加载中...');
      try {
        const file = posts.find(p => p.name === name);
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${POSTS_DIR}/${name}?ref=${BRANCH}`, {
          headers: token ? { Authorization: `token ${token}` } : {}
        });
        const data = await res.json();
        const content = decodeBase64(data.content);
        currentFile = { name, sha: data.sha };
        $('filePath').textContent = `${POSTS_DIR}/${name}`;

        // Parse frontmatter
        const match = content.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
        if (match) {
          const meta = parseFrontmatter(match[1]);
          $('metaTitle').value = meta.title || '';
          $('metaCategory').value = meta.categories?.[0] || '公告';
          $('metaTags').value = (meta.tags || []).join(',');
          $('editor').value = match[2].trim();
        } else {
          $('metaTitle').value = name.replace(/\.md$/, '');
          $('editor').value = content;
        }

        updatePreview();
        renderPostList();
        setStatus('ok', `已加载: ${name}`);
      } catch (err) {
        setStatus('err', '加载失败');
      }
    }

    // ============================================
    // New post
    // ============================================
    function newPost() {
      currentFile = null;
      const today = new Date().toISOString().slice(0, 10);
      $('metaTitle').value = '';
      $('metaCategory').value = '公告';
      $('metaTags').value = '';
      $('editor').value = '';
      $('filePath').textContent = `${POSTS_DIR}/${today}-新文章.md`;
      updatePreview();
      renderPostList();
      $('metaTitle').focus();
    }

    // ============================================
    // Save post
    // ============================================
    async function savePost() {
      if (!token) {
        $('tokenDialog').classList.remove('hidden');
        return;
      }

      const title = $('metaTitle').value.trim();
      if (!title) { showToast('请填写标题', 'error'); return; }

      const today = new Date().toISOString().slice(0, 10);
      const slug = slugify(title);
      const fileName = currentFile?.name || `${today}-${slug}.md`;

      const category = $('metaCategory').value;
      const tags = $('metaTags').value.split(',').map(t => t.trim()).filter(Boolean);
      const body = $('editor').value;

      const frontmatter = [
        '---',
        `title: "${title}"`,
        `date: ${today}`,
        `categories: [${category}]`,
        `tags: [${tags.join(', ')}]`,
        '---',
      ].join('\n');

      const content = frontmatter + '\n\n' + body;
      const encoded = encodeBase64(content);

      setStatus('loading', '保存中...');
      $('saveBtn').disabled = true;

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${POSTS_DIR}/${fileName}`, {
          method: 'PUT',
          headers: {
            Authorization: `token ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: currentFile ? `update: ${title}` : `post: ${title}`,
            content: encoded,
            sha: currentFile?.sha,
            branch: BRANCH,
          }),
        });

        if (res.ok) {
          const data = await res.json();
          currentFile = { name: fileName, sha: data.content.sha };
          $('filePath').textContent = `${POSTS_DIR}/${fileName}`;
          setStatus('ok', `已保存: ${fileName}`);
          showToast('✅ 保存成功！部署中...', 'success');
          loadPosts();
        } else {
          const err = await res.json();
          throw new Error(err.message || '保存失败');
        }
      } catch (err) {
        setStatus('err', `保存失败: ${err.message}`);
        showToast(`❌ ${err.message}`, 'error');
      }

      $('saveBtn').disabled = false;
    }

    // ============================================
    // Preview
    // ============================================
    function updatePreview() {
      const title = $('metaTitle').value;
      const body = $('editor').value;
      const html = (title ? `<h1>${escapeHtml(title)}</h1>` : '') + marked.parse(body);
      $('preview').innerHTML = html || '<p style="color:var(--muted)">开始写作后这里会显示预览...</p>';
      $('wordCount').textContent = `${body.length} 字`;
      $('filePath').textContent = currentFile ? `${POSTS_DIR}/${currentFile.name}` : `${POSTS_DIR}/${new Date().toISOString().slice(0,10)}-${slugify(title || '新文章')}.md`;
    }

    // ============================================
    // Helpers
    // ============================================
    function setStatus(type, text) {
      $('statusDot').className = `dot ${type}`;
      $('statusText').textContent = text;
    }

    function showToast(msg, type) {
      const t = $('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function slugify(str) {
      return str.toLowerCase()
        .replace(/[^\w一-鿿\s-]/g, '')
        .replace(/[\s]+/g, '-')
        .replace(/-+/g, '-')
        .slice(0, 50) || 'post';
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function decodeBase64(str) {
      return decodeURIComponent(escape(atob(str)));
    }

    function encodeBase64(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function parseFrontmatter(str) {
      const meta = {};
      str.split('\n').forEach(line => {
        const m = line.match(/^(\w+):\s*(.+)$/);
        if (m) {
          let val = m[2].trim().replace(/^["']|["']$/g, '');
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
          }
          meta[m[1]] = val;
        }
      });
      return meta;
    }

    function handleTab(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = e.target.selectionStart;
        const end = e.target.selectionEnd;
        e.target.value = e.target.value.substring(0, start) + '  ' + e.target.value.substring(end);
        e.target.selectionStart = e.target.selectionEnd = start + 2;
        updatePreview();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        savePost();
      }
    }
  </script>
</body>
</html>
