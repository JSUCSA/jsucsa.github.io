backend:
  name: github
  repo: JSUCSA/jsucsa.github.io
  branch: main
  # Cloudflare Worker OAuth 网关（限制登录账号）
  base_url: https://jsucsa-cms-auth.jsucsa.workers.dev
  auth_endpoint: auth

publish_mode: editorial_workflow

media_folder: "source/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "博客文章"
    folder: "source/_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    path: "{{title}}"
    preview_path: "blog/{{year}}/{{month}}/{{day}}/{{title}}/"
    media_folder: ""
    public_folder: ""
    sort_by: "date"
    sort_direction: "descending"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - label: "分类"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - "SRE"
          - "Agent"
          - "网络安全"
          - "AI"
          - "公告"
        default: ["公告"]
      - label: "标签"
        name: "tags"
        widget: "list"
        allow_add: true
      - { label: "摘要", name: "description", widget: "text", required: false }
      - { label: "正文", name: "body", widget: "markdown" }
      - label: "置顶"
        name: "sticky"
        widget: "number"
        required: false
        min: 0
        max: 10
