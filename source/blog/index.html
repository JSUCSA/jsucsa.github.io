<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客 — JSUCSA</title>
  <meta name="description" content="JSUCSA 技术博客 — SRE · Agent · 安全 · AI">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #0a0e1a; --bg2: #111827; --card: #1a1f35;
      --text: #f1f5f9; --text2: #94a3b8; --muted: #64748b;
      --blue: #3b82f6; --cyan: #06b6d4; --purple: #8b5cf6;
      --green: #10b981; --border: rgba(148,163,184,0.1);
      --glow: rgba(59,130,246,0.15);
      --grad: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --font: 'Noto Sans SC', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.7; -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; transition:0.3s; }

    /* Navbar */
    .nav { position:fixed; top:0; left:0; right:0; z-index:100; padding:16px 0; backdrop-filter:blur(20px); background:rgba(10,14,26,0.85); border-bottom:1px solid var(--border); }
    .nav-inner { max-width:900px; margin:0 auto; padding:0 24px; display:flex; align-items:center; justify-content:space-between; }
    .nav-logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:1.1rem; }
    .nav-logo .icon { font-family:var(--mono); color:var(--cyan); background:rgba(6,182,212,0.1); padding:5px 9px; border-radius:8px; border:1px solid rgba(6,182,212,0.2); font-size:0.95rem; }
    .nav-links { display:flex; gap:6px; }
    .nav-links a { padding:8px 14px; border-radius:8px; font-size:0.85rem; color:var(--text2); }
    .nav-links a:hover { color:var(--text); background:rgba(255,255,255,0.05); }
    .nav-links .cta { background:var(--grad); color:#fff !important; border-radius:20px; font-weight:600; }

    /* Main */
    .main { max-width:900px; margin:0 auto; padding:100px 24px 60px; }

    /* Header */
    .page-header { margin-bottom:48px; }
    .page-header h1 { font-size:clamp(2rem,4vw,2.8rem); font-weight:900; margin-bottom:12px; }
    .page-header .grad { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .page-header p { color:var(--text2); font-size:1.05rem; }

    /* Filter */
    .filter { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:32px; }
    .filter-btn {
      padding:8px 18px; border-radius:20px; font-size:0.85rem; font-weight:500;
      background:var(--card); border:1px solid var(--border); color:var(--text2);
      cursor:pointer; transition:0.3s; font-family:var(--font);
    }
    .filter-btn:hover, .filter-btn.active { background:var(--grad); color:#fff; border-color:transparent; }

    /* Posts */
    .posts { display:grid; gap:20px; }
    .post-card {
      background:var(--card); border:1px solid var(--border); border-radius:16px;
      padding:28px 32px; transition:0.3s; cursor:pointer; position:relative; overflow:hidden;
    }
    .post-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--grad); transform:scaleX(0); transition:0.3s; }
    .post-card:hover { border-color:rgba(59,130,246,0.3); transform:translateY(-3px); box-shadow:0 12px 30px rgba(0,0,0,0.3); }
    .post-card:hover::before { transform:scaleX(1); }
    .post-meta { display:flex; align-items:center; gap:12px; margin-bottom:10px; font-size:0.8rem; color:var(--muted); }
    .post-meta .cat { padding:3px 10px; background:rgba(59,130,246,0.1); border-radius:12px; color:var(--blue); font-weight:500; }
    .post-card h2 { font-size:1.25rem; font-weight:700; margin-bottom:8px; }
    .post-card h2:hover { color:var(--cyan); }
    .post-card .excerpt { color:var(--text2); font-size:0.9rem; line-height:1.7; }
    .post-card .tags { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
    .post-card .tag { padding:3px 10px; background:rgba(139,92,246,0.1); border-radius:12px; font-size:0.75rem; color:var(--purple); }

    /* Post detail */
    .post-detail { display:none; }
    .post-detail.active { display:block; }
    .post-detail .back { display:inline-flex; align-items:center; gap:6px; color:var(--text2); margin-bottom:24px; font-size:0.9rem; }
    .post-detail .back:hover { color:var(--blue); }
    .post-detail h1 { font-size:clamp(1.8rem,3vw,2.5rem); font-weight:800; margin-bottom:16px; }
    .post-detail .detail-meta { display:flex; gap:16px; color:var(--muted); font-size:0.85rem; margin-bottom:32px; }
    .post-detail .content { font-size:1rem; line-height:1.9; }
    .post-detail .content h2 { font-size:1.5rem; font-weight:700; margin:32px 0 16px; }
    .post-detail .content h3 { font-size:1.2rem; font-weight:600; margin:24px 0 12px; }
    .post-detail .content p { margin-bottom:16px; color:var(--text2); }
    .post-detail .content pre { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; overflow-x:auto; margin:16px 0; font-family:var(--mono); font-size:0.85rem; line-height:1.6; }
    .post-detail .content code { font-family:var(--mono); background:rgba(59,130,246,0.1); padding:2px 6px; border-radius:4px; font-size:0.85em; }
    .post-detail .content pre code { background:none; padding:0; }
    .post-detail .content ul, .post-detail .content ol { padding-left:24px; margin-bottom:16px; color:var(--text2); }
    .post-detail .content li { margin-bottom:8px; }
    .post-detail .content blockquote { border-left:3px solid var(--blue); padding:12px 20px; margin:16px 0; background:rgba(59,130,246,0.05); border-radius:0 8px 8px 0; color:var(--text2); }
    .post-detail .content a { color:var(--cyan); }
    .post-detail .content a:hover { text-decoration:underline; }

    /* Loading */
    .loading { text-align:center; color:var(--muted); padding:60px 0; }
    .loading .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Empty */
    .empty { text-align:center; padding:80px 0; color:var(--muted); }
    .empty i { font-size:3rem; margin-bottom:16px; display:block; }

    /* Footer */
    .footer { text-align:center; padding:40px 24px; color:var(--muted); font-size:0.85rem; border-top:1px solid var(--border); margin-top:60px; }

    /* Responsive */
    @media (max-width:768px) {
      .nav-links { display:none; }
      .post-card { padding:20px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><span class="icon">&lt;/&gt;</span> JSUCSA</a>
      <div class="nav-links">
        <a href="/">首页</a>
        <a href="/blog/" style="color:var(--text)">博客</a>
        <a href="/admin/" class="cta"><i class="fas fa-pen"></i> 写文章</a>
        <a href="https://jsucsa.github.io/Lab-E-club/" target="_blank">ITLab 社区</a>
      </div>
    </div>
  </nav>

  <div class="main">
    <!-- 列表视图 -->
    <div id="listView">
      <div class="page-header">
        <h1>技术<span class="grad">博客</span></h1>
        <p>SRE · Agent 开发 · 网络安全 · AI</p>
      </div>
      <div class="filter" id="filter"></div>
      <div class="posts" id="posts">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>
    </div>

    <!-- 文章详情视图 -->
    <div class="post-detail" id="detailView">
      <a class="back" href="/blog/"><i class="fas fa-arrow-left"></i> 返回列表</a>
      <h1 id="detailTitle"></h1>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="content" id="detailContent"></div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2025 JSUCSA · 江苏大学计算机协会</p>
  </footer>

  <!-- Sanity Client -->
  <script src="https://cdn.jsdelivr.net/npm/@sanity/client@6/dist/cdn-browser.js"></script>
  <!-- Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // ============================================
    // Sanity 配置 — 替换为你的项目信息
    // ============================================
    const SANITY_PROJECT_ID = 'YOUR_PROJECT_ID';
    const SANITY_DATASET = 'production';

    const client = new SanityClient({
      projectId: SANITY_PROJECT_ID,
      dataset: SANITY_DATASET,
      apiVersion: '2025-06-01',
      useCdn: true,
    });

    const CATEGORIES = ['全部', 'SRE', 'Agent', '网络安全', 'AI', '公告'];
    let allPosts = [];
    let currentFilter = '全部';

    // ============================================
    // 获取文章列表
    // ============================================
    async function fetchPosts() {
      const query = `*[_type == "post"] | order(publishedAt desc) {
        _id,
        title,
        slug,
        excerpt,
        publishedAt,
        categories,
        tags,
        body
      }`;
      return client.fetch(query);
    }

    // ============================================
    // 渲染文章列表
    // ============================================
    function renderPosts(posts) {
      const container = document.getElementById('posts');
      if (!posts.length) {
        container.innerHTML = `<div class="empty"><i class="fas fa-file-alt"></i><p>暂无文章</p><p style="font-size:0.85rem;margin-top:8px;">去 <a href="/admin/" style="color:var(--cyan)">管理后台</a> 写一篇吧</p></div>`;
        return;
      }
      container.innerHTML = posts.map(post => `
        <div class="post-card" onclick="viewPost('${post.slug.current}')">
          <div class="post-meta">
            <span class="cat">${(post.categories && post.categories[0]) || '公告'}</span>
            <span>${formatDate(post.publishedAt)}</span>
          </div>
          <h2>${escapeHtml(post.title)}</h2>
          <div class="excerpt">${escapeHtml(post.excerpt || '')}</div>
          ${post.tags && post.tags.length ? `<div class="tags">${post.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
        </div>
      `).join('');
    }

    // ============================================
    // 渲染筛选按钮
    // ============================================
    function renderFilter() {
      const container = document.getElementById('filter');
      container.innerHTML = CATEGORIES.map(c =>
        `<button class="filter-btn ${c === currentFilter ? 'active' : ''}" onclick="filterPosts('${c}')">${c}</button>`
      ).join('');
    }

    function filterPosts(cat) {
      currentFilter = cat;
      renderFilter();
      const filtered = cat === '全部' ? allPosts : allPosts.filter(p => p.categories && p.categories.includes(cat));
      renderPosts(filtered);
    }

    // ============================================
    // 查看文章详情
    // ============================================
    async function viewPost(slug) {
      const post = allPosts.find(p => p.slug.current === slug);
      if (!post) return;

      document.getElementById('listView').style.display = 'none';
      const detail = document.getElementById('detailView');
      detail.classList.add('active');

      document.getElementById('detailTitle').textContent = post.title;
      document.getElementById('detailMeta').innerHTML = `
        <span><i class="fas fa-calendar"></i> ${formatDate(post.publishedAt)}</span>
        ${(post.categories || []).map(c => `<span class="cat" style="padding:3px 10px;background:rgba(59,130,246,0.1);border-radius:12px;color:var(--blue);font-size:0.8rem;">${c}</span>`).join('')}
      `;

      // 渲染 Markdown 正文
      let body = post.body || '';
      // 处理 Sanity 的 block content（如果是数组格式）
      if (Array.isArray(body)) {
        body = body.map(block => {
          if (block._type === 'block') {
            return block.children.map(child => child.text).join('');
          }
          return '';
        }).join('\n\n');
      }
      document.getElementById('detailContent').innerHTML = marked.parse(body);

      // 更新 URL
      history.pushState(null, '', `/blog/#${slug}`);
      document.title = `${post.title} — JSUCSA`;
    }

    function backToList() {
      document.getElementById('detailView').classList.remove('active');
      document.getElementById('listView').style.display = 'block';
      history.pushState(null, '', '/blog/');
      document.title = '博客 — JSUCSA';
    }

    // ============================================
    // 工具函数
    // ============================================
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ============================================
    // 初始化
    // ============================================
    (async () => {
      renderFilter();

      // 检查 URL hash，直接显示某篇文章
      const hash = location.hash.slice(1);

      try {
        allPosts = await fetchPosts();
      } catch (err) {
        document.getElementById('posts').innerHTML = `<div class="empty"><i class="fas fa-exclamation-triangle"></i><p>加载失败</p><p style="font-size:0.85rem;margin-top:8px;">请检查 Sanity 配置</p></div>`;
        return;
      }

      if (hash) {
        viewPost(hash);
      } else {
        renderPosts(allPosts);
      }

      // 浏览器前进后退
      window.addEventListener('popstate', () => {
        const h = location.hash.slice(1);
        if (h) { viewPost(h); } else { backToList(); }
      });
    })();
  </script>
</body>
</html>
